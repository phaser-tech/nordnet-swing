services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nordnet-swing-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nordnet_swing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_only_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-nordnet_swing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nordnet_swing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    name: nordnet_swing_postgres_data
